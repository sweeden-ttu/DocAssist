training:
  n_way: 5
  k_shot: 5
  n_episodes: 100
  eval_episodes: 20

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "IMAGE_TEXT_TO_TEXT"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training_params:
  learning_rate: 2.0e-4
  batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 50
  eval_steps: 50
  save_total_limit: 3

model:
  base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  finetuned_model_name: "docassist-irs-finetuned"

dataset:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  augmentation:
    enabled: true
    rotation_range: 5
    brightness_range: 0.1
    contrast_range: 0.1
