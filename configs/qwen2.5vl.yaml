lmstudio_url: "http://localhost:1234"
model_name: "Qwen/Qwen2.5-VL-7B-Instruct"

model_config:
  torch_dtype: "bfloat16"
  device_map: "auto"
  attn_implementation: "flash_attention_2"

processor:
  min_pixels: 256 * 28 * 28
  max_pixels: 1280 * 28 * 28

generation:
  temperature: 0.1
  max_new_tokens: 2048
  top_p: 0.9
  do_sample: true

detection_prompt: |
  You are an expert at analyzing IRS tax form documents.
  Examine the form image and identify all fillable fields.
  For each field provide: type, label, bbox_2d, confidence, fillable.
  Return JSON only.

extraction_prompt: |
  Extract the following information from this IRS form:
  - All text fields with their values
  - All checkbox states
  - All currency amounts
  - Dates in MM/DD/YYYY format
  Return structured JSON.
