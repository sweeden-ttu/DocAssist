validator:
  name: "Local CPU Validator"
  endpoint: "http://192.168.0.15:1234"
  model: "Qwen/Qwen2.5-VL-7B-Instruct-GGUF"
  platform: "linux-cpu"
  description: "Ground truth model - all outputs trusted"
  max_memory: "16GB"
  quantization: "int8"

trainer:
  name: "Mac MLX Trainer"
  endpoint: "http://192.168.0.13:1234"
  model: "lmstudio-community/Qwen2.5-VL-7B-Instruct-4bit-MLX"
  platform: "mac-mlx"
  description: "Secondary model for training comparison"
  max_memory: "16GB"
  quantization: "int4"

ensemble:
  voting_strategy: "validator_ground_truth"
  confidence_threshold: 0.85
  iou_threshold: 0.5
  validator_weight: 1.0
  trainer_weight: 0.5
  require_agreement: false

validation:
  compare_outputs: true
  log_disagreements: true
  save_trainer_extras: true
  disagreement_threshold: 0.3
